name: Delete dev.to article

on:
  workflow_dispatch:
    inputs:
      article_id:
        description: "dev.to article id to delete"
        required: true
        type: string

permissions:
  contents: read

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Delete dev.to article
        run: node scripts/delete-dev.to-article.mjs
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          DEVTO_ARTICLE_ID: ${{ inputs.article_id }}
